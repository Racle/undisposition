<!doctype html>

<html lang="en">
  <head>
    <title>Undisposition settings</title>
    <link rel="shortcut icon" href="../icons/icon128.png" type="image/png" />
    <meta charset="utf-8" />
    <style>
      html {
        background: #262626;
        color: #fff;
      }
      body {
        width: 600px;
        margin: 0 auto;
      }
      p {
        font-size: 0.9em;
      }
      button,
      textarea,
      input {
        background: #38383d;
        color: #fff;
        border-radius: 4px;
        padding-left: 8px;
        padding-right: 8px;
        padding-top: 4px;
        padding-bottom: 4px;
      }
      input,
      textarea {
        background: #38383d;
        color: #fff;
      }
      .mode-toggle {
        margin-bottom: 16px;
      }
      .mode-toggle label {
        margin-right: 16px;
        cursor: pointer;
      }
      .mode-toggle input[type='radio'] {
        margin-right: 4px;
        cursor: pointer;
      }
      .list-section {
        display: none;
      }
      .list-section.active {
        display: block;
      }
    </style>
  </head>

  <body>
    <h2>List mode</h2>
    <div class="mode-toggle">
      <label>
        <input type="radio" name="listMode" value="blocklist" checked />
        Blocklist
      </label>
      <label>
        <input type="radio" name="listMode" value="allowlist" />
        Allowlist
      </label>
    </div>

    <div id="blocklist-section" class="list-section active">
      <h3>Blocklist</h3>
      <p>Disables Undisposition on these domains. <br />One entry per line.</p>
      <textarea id="blacklist" rows="10" cols="50"> </textarea>
    </div>

    <div id="allowlist-section" class="list-section">
      <h3>Allowlist</h3>
      <p>Enables Undisposition <strong>only</strong> on these domains. <br />One entry per line.</p>
      <textarea id="allowlist" rows="10" cols="50"> </textarea>
    </div>

    <br />
    <button id="submit">Save</button>
    <br />
    <br />
    <hr />
    <h2>Domain tester</h2>
    <p>Enter a URL to test if it matches the current list.</p>
    <input type="text" id="test" /> <button id="testButton">Test</button>

    <div id="testResult"></div>

    <script src="settings.js"></script>
  </body>
</html>
