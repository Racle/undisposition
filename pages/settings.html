<!doctype html>

<html lang="en">
  <head>
    <title>Undisposition settings</title>
    <link rel="shortcut icon" href="../icons/icon128.png" type="image/png" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }

      body {
        max-width: 560px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      .header img {
        width: 36px;
        height: 36px;
      }

      .header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #fff;
      }

      /* Cards */
      .card {
        background: #16213e;
        border: 1px solid #2a2a4a;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }

      .card h2 {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #b0b0cc;
        margin-bottom: 16px;
      }

      .card p {
        font-size: 0.9rem;
        color: #b0b0b0;
        margin-bottom: 12px;
      }

      /* Segmented control */
      .segmented-control {
        display: inline-flex;
        background: #0f1629;
        border-radius: 8px;
        padding: 3px;
        gap: 2px;
      }

      .segmented-control input[type='radio'] {
        display: none;
      }

      .segmented-control label {
        padding: 8px 24px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        color: #888;
        transition: all 0.2s ease;
        user-select: none;
      }

      .segmented-control input[type='radio']:checked + label {
        background: #5084ee;
        color: #fff;
      }

      .segmented-control label:hover {
        color: #ccc;
      }

      .segmented-control input[type='radio']:checked + label:hover {
        color: #fff;
      }

      /* List sections */
      .list-section {
        display: none;
        margin-top: 16px;
      }

      .list-section.active {
        display: block;
      }

      .list-section .description {
        font-size: 0.85rem;
        color: #b0b0b0;
        margin-bottom: 10px;
      }

      /* Textarea */
      textarea {
        width: 100%;
        min-height: 160px;
        background: #0f1629;
        color: #e0e0e0;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        padding: 12px;
        font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas,
          monospace;
        font-size: 0.85rem;
        line-height: 1.6;
        resize: vertical;
        transition: border-color 0.2s ease;
      }

      textarea:focus {
        outline: none;
        border-color: #5084ee;
      }

      textarea::placeholder {
        color: #555;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background: #5084ee;
        color: #fff;
      }

      .btn-primary:hover {
        background: #6094ff;
      }

      .btn-secondary {
        background: #2a2a4a;
        color: #ccc;
      }

      .btn-secondary:hover {
        background: #3a3a5a;
      }

      .save-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 16px;
      }

      /* Toast */
      .toast {
        font-size: 0.85rem;
        color: #4caf50;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .toast.visible {
        opacity: 1;
      }

      /* Tester */
      .tester-row {
        display: flex;
        gap: 8px;
      }

      .tester-row input[type='text'] {
        flex: 1;
        background: #0f1629;
        color: #e0e0e0;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 0.9rem;
        transition: border-color 0.2s ease;
      }

      .tester-row input[type='text']:focus {
        outline: none;
        border-color: #5084ee;
      }

      .tester-row input[type='text']::placeholder {
        color: #555;
      }

      /* Test result */
      .test-result {
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        display: none;
      }

      .test-result.visible {
        display: block;
      }

      .test-result.match {
        background: rgba(233, 30, 99, 0.1);
        border: 1px solid rgba(233, 30, 99, 0.3);
        color: #e91e63;
      }

      .test-result.no-match {
        background: rgba(76, 175, 80, 0.1);
        border: 1px solid rgba(76, 175, 80, 0.3);
        color: #4caf50;
      }

      /* Blocklist match = blocked (bad for inline), allowlist no-match = not allowed (bad) */
      .test-result.blocked {
        background: rgba(233, 30, 99, 0.1);
        border: 1px solid rgba(233, 30, 99, 0.3);
        color: #e91e63;
      }

      .test-result.active-on {
        background: rgba(76, 175, 80, 0.1);
        border: 1px solid rgba(76, 175, 80, 0.3);
        color: #4caf50;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <img src="../icons/icon128.png" alt="" />
      <h1>Undisposition Settings</h1>
    </div>

    <div class="card">
      <h2>List Mode</h2>
      <div class="segmented-control">
        <input type="radio" name="listMode" id="mode-blocklist" value="blocklist" checked />
        <label for="mode-blocklist">Blocklist</label>
        <input type="radio" name="listMode" id="mode-allowlist" value="allowlist" />
        <label for="mode-allowlist">Allowlist</label>
      </div>

      <div id="blocklist-section" class="list-section active">
        <p class="description">
          Undisposition is active on all domains <strong>except</strong> these. One domain per line.
        </p>
        <textarea id="blacklist" placeholder="example.com&#10;drive.google.com" spellcheck="false"></textarea>
      </div>

      <div id="allowlist-section" class="list-section">
        <p class="description">
          Undisposition is <strong>only</strong> active on these domains. One domain per line.
        </p>
        <textarea id="allowlist" placeholder="example.com&#10;gitlab.com" spellcheck="false"></textarea>
      </div>

      <div class="save-row">
        <button class="btn btn-primary" id="submit">Save</button>
        <span class="toast" id="saveToast">Saved</span>
      </div>
    </div>

    <div class="card">
      <h2>Domain Tester</h2>
      <p>Check if a domain matches the current list.</p>
      <div class="tester-row">
        <input type="text" id="test" placeholder="https://example.com/file.pdf" spellcheck="false" />
        <button class="btn btn-secondary" id="testButton">Test</button>
      </div>
      <div class="test-result" id="testResult"></div>
    </div>

    <script src="settings.js"></script>
  </body>
</html>
